const {useState,useEffect,useCallback,useMemo}=React;

function shuffle(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;}
function loadLS(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}}
function saveLS(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}

function estimateToeic(stats){
  if(!stats||stats.total===0)return{score:400,level:"A2",pct:0};
  const pct=stats.correct/stats.total;
  const byLevel=stats.byLevel||{};
  const weights={A1:0.05,A2:0.10,B1:0.20,B2:0.25,C1:0.25,C2:0.15};
  let ws=0,tw=0;
  Object.entries(byLevel).forEach(([lvl,d])=>{if(d.total>0&&weights[lvl]){ws+=(d.correct/d.total)*weights[lvl];tw+=weights[lvl];}});
  const ap=tw>0?ws/tw:pct;
  const toeic=Math.round(10+ap*980);
  const level=toeic<250?"A1":toeic<400?"A2":toeic<600?"B1":toeic<750?"B2":toeic<900?"C1":"C2";
  return{score:toeic,level,pct:Math.round(ap*100)};
}

function App(){
  const[mode,setMode]=useState("home");
  const[level,setLevel]=useState("B1");
  const[cat,setCat]=useState("all");
  const[pool,setPool]=useState([]);
  const[poolIdx,setPoolIdx]=useState(0);
  const[current,setCurrent]=useState(null);
  const[chosen,setChosen]=useState(null);
  const[answered,setAnswered]=useState(false);
  const[score,setScore]=useState(0);
  const[streak,setStreak]=useState(0);
  const[total,setTotal]=useState(0);
  const[errors,setErrors]=useState(()=>loadLS("ep_errors3",{}));
  const[stats,setStats]=useState(()=>loadLS("ep_stats3",{total:0,correct:0,byLevel:{},byCat:{}}));
  const[dailyErrors,setDailyErrors]=useState([]);
  const[dailyIdx,setDailyIdx]=useState(0);
  const[todayDone,setTodayDone]=useState(()=>loadLS("ep_today","")===new Date().toDateString());

  const buildPool=useCallback((lvl,ct)=>{
    return shuffle(ALL_QUESTIONS.filter(q=>{
      if(lvl!=="all"&&q.level!==lvl)return false;
      if(ct!=="all"&&q.cat!==ct)return false;
      return true;
    }));
  },[]);

  const startQuiz=useCallback(()=>{
    const p=buildPool(level,cat);
    setPool(p);setPoolIdx(0);setCurrent(p[0]||null);
    setChosen(null);setAnswered(false);setScore(0);setStreak(0);setTotal(0);
    setMode("quiz");
  },[level,cat,buildPool]);

  const startErrorMode=useCallback(()=>{
    const top=Object.entries(errors).sort((a,b)=>b[1]-a[1]).slice(0,10).map(e=>parseInt(e[0]));
    const qs=shuffle(ALL_QUESTIONS.filter(q=>top.includes(q.id)));
    setDailyErrors(qs);setDailyIdx(0);
    setChosen(null);setAnswered(false);setScore(0);setStreak(0);setTotal(0);
    setMode("errors");
  },[errors]);

  const currentQ=mode==="errors"?dailyErrors[dailyIdx]:current;

  const handleAnswer=useCallback((opt)=>{
    if(answered||!currentQ)return;
    setChosen(opt);setAnswered(true);
    const ok=opt===currentQ.answer;
    setScore(s=>ok?s+1:s);setStreak(s=>ok?s+1:0);setTotal(t=>t+1);
    const ne={...errors};
    if(!ok){ne[currentQ.id]=(ne[currentQ.id]||0)+1;}
    else if(ne[currentQ.id]){ne[currentQ.id]=Math.max(0,ne[currentQ.id]-1);if(ne[currentQ.id]===0)delete ne[currentQ.id];}
    setErrors(ne);saveLS("ep_errors3",ne);
    const ns={total:stats.total+1,correct:stats.correct+(ok?1:0),byLevel:{...stats.byLevel},byCat:{...stats.byCat}};
    const lvl=currentQ.level,ct=currentQ.cat;
    ns.byLevel[lvl]=ns.byLevel[lvl]||{total:0,correct:0};ns.byLevel[lvl].total++;if(ok)ns.byLevel[lvl].correct++;
    ns.byCat[ct]=ns.byCat[ct]||{total:0,correct:0};ns.byCat[ct].total++;if(ok)ns.byCat[ct].correct++;
    setStats(ns);saveLS("ep_stats3",ns);
  },[answered,currentQ,errors,stats]);

  const nextQ=useCallback(()=>{
    setChosen(null);setAnswered(false);
    if(mode==="errors"){
      const ni=dailyIdx+1;
      if(ni>=dailyErrors.length){saveLS("ep_today",new Date().toDateString());setTodayDone(true);setMode("home");}
      else setDailyIdx(ni);
    }else{
      const ni=poolIdx+1;
      if(ni>=pool.length){const p=buildPool(level,cat);setPool(p);setPoolIdx(0);setCurrent(p[0]);}
      else{setPoolIdx(ni);setCurrent(pool[ni]);}
    }
  },[mode,dailyIdx,dailyErrors,poolIdx,pool,level,cat,buildPool]);

  const toeic=useMemo(()=>estimateToeic(stats),[stats]);
  const errorCount=Object.keys(errors).length;
  const e=React.createElement;
  const s=(style)=>style;

  // ── HOME ──
  if(mode==="home"){
    const toeicRanges=[{level:"A1",label:"Débutant",min:10,max:250},{level:"A2",label:"Élémentaire",min:250,max:400},{level:"B1",label:"Intermédiaire",min:400,max:600},{level:"B2",label:"Indépendant",min:600,max:750},{level:"C1",label:"Avancé",min:750,max:900},{level:"C2",label:"Maîtrise",min:900,max:990}];
    const barPct=Math.min(100,((toeic.score-10)/980)*100);
    return e("div",{style:{maxWidth:480,margin:"0 auto",padding:"20px 16px",minHeight:"100vh"}},
      e("div",{style:{textAlign:"center",marginBottom:24}},
        e("div",{style:{fontSize:32,marginBottom:4}},"🧩"),
        e("div",{style:{fontSize:22,fontWeight:700,color:"#fff"}},"English Puzzle"),
        e("div",{style:{fontSize:12,color:"#7070a0",marginTop:2}},"Entraînement TOEIC • Niveaux A1 → C2")
      ),
      // TOEIC Card
      e("div",{style:{background:"#1a1a2e",borderRadius:16,padding:"20px 16px",marginBottom:14,border:"1px solid #2a2a4a"}},
        e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}},
          e("div",null,
            e("div",{style:{fontSize:12,color:"#7070a0",marginBottom:4}},"Score TOEIC estimé"),
            e("div",{style:{fontSize:40,fontWeight:800,color:LEVEL_COLORS[toeic.level]||"#6c63ff"}},toeic.score),
            e("div",{style:{fontSize:13,color:"#9090b0",marginTop:2}},
              "Niveau ",e("span",{style:{color:LEVEL_COLORS[toeic.level],fontWeight:700}},toeic.level),
              " • ",toeicRanges.find(r=>r.level===toeic.level)?.label
            )
          ),
          e("div",{style:{width:72,height:72,borderRadius:"50%",border:`4px solid ${LEVEL_COLORS[toeic.level]||"#6c63ff"}`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"#0f0f1a"}},
            e("div",{style:{fontSize:18,fontWeight:800,color:"#fff"}},toeic.pct+"%"),
            e("div",{style:{fontSize:10,color:"#7070a0"}},"réussite")
          )
        ),
        e("div",{style:{height:8,background:"#0f0f1a",borderRadius:4,overflow:"hidden",marginBottom:8}},
          e("div",{style:{height:"100%",width:barPct+"%",background:`linear-gradient(90deg,#00d9a3,${LEVEL_COLORS[toeic.level]})`,borderRadius:4,transition:"width 0.6s"}})
        ),
        e("div",{style:{display:"flex",gap:3,marginBottom:12}},
          toeicRanges.map(r=>e("div",{key:r.level,style:{flex:1,padding:"5px 0",borderRadius:6,textAlign:"center",background:r.level===toeic.level?LEVEL_COLORS[r.level]+"33":"#0f0f1a",border:`1px solid ${r.level===toeic.level?LEVEL_COLORS[r.level]:"#2a2a4a"}`}},
            e("div",{style:{fontSize:11,fontWeight:700,color:LEVEL_COLORS[r.level]}},r.level),
            e("div",{style:{fontSize:9,color:"#6060a0"}},r.min)
          ))
        ),
        stats.total>0&&e("div",{style:{fontSize:11,color:"#5050a0",textAlign:"center"}},`${stats.total} questions • ${stats.correct} correctes`)
      ),
      // Erreurs Card
      errorCount>0&&e("div",{style:{background:todayDone?"#1a2a1a":"#1a1a2e",borderRadius:14,padding:16,marginBottom:12,border:`1px solid ${todayDone?"#2a4a2a":"#ff658444"}`,cursor:todayDone?"default":"pointer"},onClick:!todayDone?startErrorMode:undefined},
        e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
          e("div",null,
            e("div",{style:{display:"flex",alignItems:"center",gap:8,marginBottom:4}},
              e("span",{style:{fontSize:20}},todayDone?"✅":"🔥"),
              e("span",{style:{fontWeight:700,color:todayDone?"#2ecc71":"#ff6584",fontSize:15}},todayDone?"Session terminée !":"10 questions du jour")
            ),
            e("div",{style:{fontSize:12,color:"#7070a0"}},todayDone?"Reviens demain pour un nouveau set":`${errorCount} erreur${errorCount>1?"s":""} à corriger`)
          ),
          !todayDone&&e("div",{style:{background:"#ff658422",color:"#ff6584",padding:"8px 14px",borderRadius:8,fontWeight:700,fontSize:13}},"Go →")
        )
      ),
      // Quiz config
      e("div",{style:{background:"#1a1a2e",borderRadius:14,padding:16,marginBottom:12,border:"1px solid #2a2a4a"}},
        e("div",{style:{fontSize:13,color:"#9090b0",marginBottom:10,fontWeight:600}},"Entraînement libre"),
        e("div",{style:{marginBottom:10}},
          e("div",{style:{fontSize:11,color:"#6060a0",marginBottom:6}},"NIVEAU"),
          e("div",{style:{display:"flex",flexWrap:"wrap",gap:6}},
            LEVELS.map(l=>e("button",{key:l,onClick:()=>setLevel(l),style:{padding:"6px 12px",borderRadius:20,fontSize:12,fontWeight:600,background:level===l?(LEVEL_COLORS[l]||"#6c63ff")+"33":"#0f0f1a",color:level===l?(LEVEL_COLORS[l]||"#e0e0ff"):"#7070a0",border:`1px solid ${level===l?(LEVEL_COLORS[l]||"#6c63ff"):"#2a2a4a"}`}},l==="all"?"Tous":l))
          )
        ),
        e("div",{style:{marginBottom:14}},
          e("div",{style:{fontSize:11,color:"#6060a0",marginBottom:6}},"CATÉGORIE"),
          e("div",{style:{display:"flex",flexWrap:"wrap",gap:6}},
            CATS.map(c=>e("button",{key:c,onClick:()=>setCat(c),style:{padding:"6px 12px",borderRadius:20,fontSize:12,fontWeight:600,background:cat===c?(CAT_COLORS[c]||"#6c63ff")+"33":"#0f0f1a",color:cat===c?(CAT_COLORS[c]||"#e0e0ff"):"#7070a0",border:`1px solid ${cat===c?(CAT_COLORS[c]||"#6c63ff"):"#2a2a4a"}`}},c==="all"?"Toutes":c))
          )
        ),
        e("button",{onClick:startQuiz,style:{width:"100%",padding:"14px",borderRadius:12,fontWeight:700,fontSize:16,background:"linear-gradient(135deg,#6c63ff,#a855f7)",color:"#fff",boxShadow:"0 4px 20px #6c63ff44"}},"🚀 Commencer")
      ),
      e("button",{onClick:()=>setMode("stats"),style:{width:"100%",padding:12,borderRadius:12,fontWeight:600,fontSize:14,background:"#1a1a2e",color:"#7070a0",border:"1px solid #2a2a4a"}},"📊 Statistiques détaillées")
    );
  }

  // ── QUIZ / ERRORS ──
  if((mode==="quiz"||mode==="errors")&&currentQ){
    const ok=answered&&chosen===currentQ.answer;
    const isEM=mode==="errors";
    const qNum=isEM?dailyIdx+1:poolIdx+1;
    const qTot=isEM?dailyErrors.length:pool.length;
    return e("div",{style:{maxWidth:480,margin:"0 auto",padding:"16px",minHeight:"100vh"}},
      e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}},
        e("button",{onClick:()=>setMode("home"),style:{background:"#1a1a2e",color:"#7070a0",padding:"8px 14px",borderRadius:10,fontSize:13,border:"1px solid #2a2a4a"}},"← Accueil"),
        e("div",{style:{display:"flex",gap:12,fontSize:13,fontWeight:700}},
          e("span",{style:{color:"#00d9a3"}},`✓ ${score}`),
          e("span",{style:{color:"#ffd93d"}},streak>=3?`🔥${streak}`:`× ${total-score}`)
        )
      ),
      e("div",{style:{marginBottom:16}},
        e("div",{style:{display:"flex",justifyContent:"space-between",fontSize:11,color:"#5050a0",marginBottom:4}},
          e("span",null,isEM?"🔥 Erreurs récurrentes":`${currentQ.cat} • ${currentQ.level}`),
          e("span",null,`${qNum}/${qTot}`)
        ),
        e("div",{style:{height:4,background:"#1a1a2e",borderRadius:2}},
          e("div",{style:{height:"100%",borderRadius:2,width:`${(qNum/qTot)*100}%`,background:isEM?"#ff6584":(LEVEL_COLORS[currentQ.level]||"#6c63ff"),transition:"width 0.3s"}})
        )
      ),
      e("div",{style:{marginBottom:14,display:"flex",gap:8}},
        e("span",{style:{padding:"4px 10px",borderRadius:20,fontSize:11,fontWeight:700,background:(LEVEL_COLORS[currentQ.level]||"#6c63ff")+"22",color:LEVEL_COLORS[currentQ.level]||"#6c63ff",border:`1px solid ${LEVEL_COLORS[currentQ.level]||"#6c63ff"}44`}},currentQ.level),
        e("span",{style:{padding:"4px 10px",borderRadius:20,fontSize:11,fontWeight:700,background:(CAT_COLORS[currentQ.cat]||"#6c63ff")+"22",color:CAT_COLORS[currentQ.cat]||"#6c63ff",border:`1px solid ${CAT_COLORS[currentQ.cat]||"#6c63ff"}44`}},currentQ.cat)
      ),
      e("div",{style:{background:"#1a1a2e",borderRadius:16,padding:"24px 20px",marginBottom:20,border:"1px solid #2a2a4a",fontSize:20,fontWeight:600,lineHeight:1.5,color:"#fff"}},currentQ.sentence),
      e("div",{style:{display:"flex",flexDirection:"column",gap:10,marginBottom:20}},
        currentQ.opts.map(opt=>{
          let bg="#1a1a2e",border="#2a2a4a",color="#c0c0e0";
          if(answered){if(opt===currentQ.answer){bg="#00d9a322";border="#00d9a3";color="#00d9a3";}else if(opt===chosen){bg="#ff658422";border="#ff6584";color="#ff6584";}}
          return e("button",{key:opt,onClick:()=>handleAnswer(opt),style:{padding:"14px 18px",borderRadius:12,textAlign:"left",fontSize:16,fontWeight:600,background:bg,color,border:`2px solid ${border}`,transition:"all 0.15s"}},
            answered&&opt===currentQ.answer?"✓ ":answered&&opt===chosen&&opt!==currentQ.answer?"✗ ":"",opt
          );
        })
      ),
      answered&&e("div",{style:{background:ok?"#00d9a311":"#ff658411",border:`1px solid ${ok?"#00d9a344":"#ff658444"}`,borderRadius:12,padding:"14px 16px",marginBottom:16}},
        e("div",{style:{fontWeight:700,color:ok?"#00d9a3":"#ff6584",marginBottom:4,fontSize:14}},ok?"✓ Correct !":"✗ Réponse : "+currentQ.answer),
        e("div",{style:{fontSize:13,color:"#9090b0"}},currentQ.hint)
      ),
      answered&&e("button",{onClick:nextQ,style:{width:"100%",padding:14,borderRadius:12,fontWeight:700,fontSize:16,background:ok?"linear-gradient(135deg,#00d9a3,#00b894)":"linear-gradient(135deg,#6c63ff,#a855f7)",color:"#fff"}},isEM&&dailyIdx>=dailyErrors.length-1?"🏁 Terminer":"Question suivante →")
    );
  }

  // ── STATS ──
  if(mode==="stats"){
    const ti=estimateToeic(stats);
    return e("div",{style:{maxWidth:480,margin:"0 auto",padding:"16px",minHeight:"100vh"}},
      e("div",{style:{display:"flex",alignItems:"center",gap:12,marginBottom:20}},
        e("button",{onClick:()=>setMode("home"),style:{background:"#1a1a2e",color:"#7070a0",padding:"8px 14px",borderRadius:10,fontSize:13,border:"1px solid #2a2a4a"}},"← Retour"),
        e("span",{style:{fontWeight:700,fontSize:18,color:"#fff"}},"📊 Mes Statistiques")
      ),
      e("div",{style:{background:"#1a1a2e",borderRadius:14,padding:16,marginBottom:12,border:"1px solid #2a2a4a"}},
        e("div",{style:{fontSize:12,color:"#7070a0",marginBottom:8}},"Score TOEIC estimé"),
        e("div",{style:{fontSize:42,fontWeight:800,color:LEVEL_COLORS[ti.level]}},ti.score),
        e("div",{style:{fontSize:13,color:"#9090b0"}},"Niveau ",e("span",{style:{color:LEVEL_COLORS[ti.level],fontWeight:700}},ti.level)," • ",stats.total," questions • ",ti.pct,"% de réussite")
      ),
      e("div",{style:{background:"#1a1a2e",borderRadius:14,padding:16,marginBottom:12,border:"1px solid #2a2a4a"}},
        e("div",{style:{fontSize:13,fontWeight:700,color:"#9090b0",marginBottom:12}},"PAR NIVEAU"),
        ["A1","A2","B1","B2","C1","C2"].map(lvl=>{
          const d=stats.byLevel?.[lvl]||{total:0,correct:0};
          const pct=d.total>0?Math.round(d.correct/d.total*100):0;
          return e("div",{key:lvl,style:{marginBottom:10}},
            e("div",{style:{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:4}},
              e("span",{style:{color:LEVEL_COLORS[lvl],fontWeight:700}},lvl),
              e("span",{style:{color:"#7070a0"}},d.total>0?`${d.correct}/${d.total} (${pct}%)`:"—")
            ),
            d.total>0&&e("div",{style:{height:6,background:"#0f0f1a",borderRadius:3}},
              e("div",{style:{height:"100%",width:pct+"%",background:LEVEL_COLORS[lvl],borderRadius:3}})
            )
          );
        })
      ),
      e("div",{style:{background:"#1a1a2e",borderRadius:14,padding:16,marginBottom:12,border:"1px solid #2a2a4a"}},
        e("div",{style:{fontSize:13,fontWeight:700,color:"#9090b0",marginBottom:12}},"PAR CATÉGORIE"),
        Object.entries(stats.byCat||{}).map(([ct,d])=>{
          const pct=d.total>0?Math.round(d.correct/d.total*100):0;
          return e("div",{key:ct,style:{marginBottom:10}},
            e("div",{style:{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:4}},
              e("span",{style:{color:CAT_COLORS[ct]||"#6c63ff",fontWeight:700}},ct),
              e("span",{style:{color:"#7070a0"}},`${d.correct}/${d.total} (${pct}%)`)
            ),
            e("div",{style:{height:6,background:"#0f0f1a",borderRadius:3}},
              e("div",{style:{height:"100%",width:pct+"%",background:CAT_COLORS[ct]||"#6c63ff",borderRadius:3}})
            )
          );
        })
      ),
      e("button",{onClick:()=>{if(confirm("Remettre à zéro ?")){{const emp={total:0,correct:0,byLevel:{},byCat:{}};setStats(emp);saveLS("ep_stats3",emp);}}},style:{width:"100%",padding:12,borderRadius:12,color:"#5050a0",background:"transparent",border:"1px solid #2a2a4a",fontSize:13}},"🗑 Réinitialiser les statistiques")
    );
  }

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
