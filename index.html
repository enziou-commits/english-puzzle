function buildVocabQuestions(vocabList,levelFilter){
  return shuffle(vocabList.filter(w=>levelFilter==="all"||w.level===levelFilter))
    .map(w=>({
      id:Math.random(),cat:"Vocabulaire",level:w.level,
      sentence:"Comment dit-on \u00ab "+w.fr+" \u00bb en anglais ?|||Traduire : "+w.fr,
      answer:w.en,
      opts:shuffle([w.en,...(w.distractors||[])].slice(0,4)),
      answerFR:w.fr,note:"",isVocab:true
    }));
}

function buildVerbPool(verbKey,tenseFilter){
  const vd=VERB_DATA[verbKey];
  const subjects=["I","you","he/she","we","they"];
  const qs=[];
  const tenses=tenseFilter==="all"?Object.keys(vd.tenses):[tenseFilter];
  tenses.forEach(tenseName=>{
    const t=vd.tenses[tenseName];
    vd.templates.forEach(tmpl=>{
      subjects.forEach(subj=>{
        const answer=t.en[subj];
        const res=typeof tmpl==="function"?tmpl(subj):null;
        if(!res)return;
        const enPart=res.en||"";
        const frRaw=res.fr||"";
        // Remplace [FR] par la conjugaison française complète → phrase FR entière visible
        const frComplete=frRaw.replace("[FR]",t.fr[subj]||answer);
        const sentence=frComplete?(enPart+"|||"+frComplete):enPart;
        const allForms=[...new Set(Object.values(t.en))].filter(f=>f!==answer);
        const otherKey=Object.keys(vd.tenses).find(k=>k!==tenseName);
        const otherForms=otherKey?[...new Set(Object.values(vd.tenses[otherKey].en))].filter(f=>f!==answer):[];
        const wrongs=shuffle([...allForms,...otherForms]).slice(0,3);
        const opts=shuffle([answer,...wrongs].slice(0,4));
        const conjTable=subjects.map(s=>s+": "+t.en[s]+" = "+t.fr[s]).join("\n");
        qs.push({id:Math.random(),cat:"Verbes",level:t.level,sentence,answer,opts,isVerbDrill:true,verbKey,tenseName,conjTable});
      });
    });
  });
  return shuffle(qs);
}

function estimateToeic(stats){
  if(!stats||stats.total===0)return{score:400,level:"A2",pct:0};
  const weights={A1:0.05,A2:0.10,B1:0.20,B2:0.25,C1:0.25,C2:0.15};
  let ws=0,tw=0;
  Object.entries(stats.byLevel||{}).forEach(([lvl,d])=>{if(d.total>0&&weights[lvl]){ws+=(d.correct/d.total)*weights[lvl];tw+=weights[lvl];}});
  const pct=stats.correct/stats.total;
  const ap=tw>0?ws/tw:pct;
  const toeic=Math.round(10+ap*980);
  const level=toeic<250?"A1":toeic<400?"A2":toeic<600?"B1":toeic<750?"B2":toeic<900?"C1":"C2";
  return{score:toeic,level,pct:Math.round(ap*100)};
}

      ),
      e("div",{style:{background:"#1a1a2e",borderRadius:13,padding:14,marginBottom:10,border:"1px solid #2a2a4a"}},
        e("div",{style:{fontSize:11,color:"#7070a0",marginBottom:4}},"Score TOEIC estimé"),
        e("div",{style:{fontSize:40,fontWeight:800,color:LC[ti.level]}},ti.score),
        e("div",{style:{fontSize:12,color:"#9090b0"}},"Niveau ",e("span",{style:{color:LC[ti.level],fontWeight:700}},ti.level)," • ",stats.total," questions • ",ti.pct,"% réussite")
      ),
      e("div",{style:{background:"#1a1a2e",borderRadius:13,padding:14,marginBottom:10,border:"1px solid #2a2a4a"}},
        e("div",{style:{fontSize:12,fontWeight:700,color:"#9090b0",marginBottom:10}},"PAR NIVEAU"),
        ["A1","A2","B1","B2","C1","C2"].map(lvl=>{
          const d=stats.byLevel?.[lvl]||{total:0,correct:0};
          const pct=d.total>0?Math.round(d.correct/d.total*100):0;
          return e("div",{key:lvl,style:{marginBottom:9}},
            e("div",{style:{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:3}},e("span",{style:{color:LC[lvl],fontWeight:700}},lvl),e("span",{style:{color:"#7070a0"}},d.total>0?d.correct+"/"+d.total+" ("+pct+"%)":"—")),
            d.total>0&&e("div",{style:{height:5,background:"#0f0f1a",borderRadius:3}},e("div",{style:{height:"100%",width:pct+"%",background:LC[lvl],borderRadius:3}}))
          );
        })
      ),
      e("div",{style:{background:"#1a1a2e",borderRadius:13,padding:14,marginBottom:10,border:"1px solid #2a2a4a"}},
        e("div",{style:{fontSize:12,fontWeight:700,color:"#9090b0",marginBottom:10}},"PAR CATÉGORIE"),
        Object.entries(stats.byCat||{}).map(([ct,d])=>{
          const pct=d.total>0?Math.round(d.correct/d.total*100):0;
          return e("div",{key:ct,style:{marginBottom:9}},
            e("div",{style:{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:3}},e("span",{style:{color:CC[ct]||"#6c63ff",fontWeight:700}},ct),e("span",{style:{color:"#7070a0"}},d.correct+"/"+d.total+" ("+pct+"%)")),
            e("div",{style:{height:5,background:"#0f0f1a",borderRadius:3}},e("div",{style:{height:"100%",width:pct+"%",background:CC[ct]||"#6c63ff",borderRadius:3}}))
          );
        })
      ),
      e("button",{onClick:()=>{if(confirm("Remettre à zéro ?")){const emp={total:0,correct:0,byLevel:{},byCat:{}};setStats(emp);saveLS("ep_st8",emp);}},style:{width:"100%",padding:11,borderRadius:11,color:"#5050a0",background:"transparent",border:"1px solid #2a2a4a",fontSize:12}},"🗑 Réinitialiser")
    );
  }
  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(e(App));
</script>
</body>
</html>
