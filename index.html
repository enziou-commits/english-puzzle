// ── Génère le pool verb drill à la volée ──
function buildVerbPool(verbKey,tenseFilter){
  const vd=VERB_DATA[verbKey];
  const subjects=["I","you","he/she","we","they"];
  const qs=[];
  const tenses=tenseFilter==="all"?Object.keys(vd.tenses):[tenseFilter];
  tenses.forEach(tenseName=>{
    const t=vd.tenses[tenseName];
    vd.templates.forEach((tmpl)=>{
      subjects.forEach(subj=>{
        const answer=t.en[subj];
        const sentence=tmpl(subj,t)[0];
        const allForms=[...new Set(Object.values(t.en))].filter(f=>f!==answer);
        const otherKey=Object.keys(vd.tenses).find(k=>k!==tenseName);
        const otherForms=otherKey?[...new Set(Object.values(vd.tenses[otherKey].en))].filter(f=>f!==answer):[];
        const wrongs=shuffle([...allForms,...otherForms]).slice(0,3);
        const opts=shuffle([answer,...wrongs].slice(0,4));
        // Tableau complet conjugaison EN = FR
        const conjTable=subjects.map(s=>`${s}: ${t.en[s]} = ${t.fr[s]}`).join("\n");
        qs.push({
          id:Math.random(),
          cat:"Verbes",level:t.level,
          sentence,answer,opts,
          isVerbDrill:true,
          verbKey,tenseName,
          conjTable // tableau EN=FR pour feedback
        });
      });
    });
  });
  return shuffle(qs);
}

//  TOEIC

function estimateToeic(stats){
  if(!stats||stats.total===0)return{score:400,level:"A2",pct:0};
  const pct=stats.correct/stats.total;
  const weights={A1:0.05,A2:0.10,B1:0.20,B2:0.25,C1:0.25,C2:0.15};
  let ws=0,tw=0;
  Object.entries(stats.byLevel||{}).forEach(([lvl,d])=>{if(d.total>0&&weights[lvl]){ws+=(d.correct/d.total)*weights[lvl];tw+=weights[lvl];}});
  const ap=tw>0?ws/tw:pct;
  const toeic=Math.round(10+ap*980);
  const level=toeic<250?"A1":toeic<400?"A2":toeic<600?"B1":toeic<750?"B2":toeic<900?"C1":"C2";
  return{score:toeic,level,pct:Math.round(ap*100)};
}

  // ══════════════════════════════
  if(mode==="verbselect"){
    const vd=selVerb?VERB_DATA[selVerb]:null;
    return e("div",{style:{maxWidth:480,margin:"0 auto",padding:"16px",minHeight:"100vh"}},
      e("div",{style:{display:"flex",alignItems:"center",gap:12,marginBottom:20}},
        e("button",{onClick:()=>setMode("home"),style:{background:"#1a1a2e",color:"#7070a0",padding:"8px 14px",borderRadius:10,fontSize:13,border:"1px solid #2a2a4a"}},"← Accueil"),
        e("span",{style:{fontWeight:700,fontSize:17,color:"#fff"}},"📚 12 Verbes Essentiels")
      ),
      e("div",{style:{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:16}},
        Object.entries(VERB_DATA).map(([key,vd])=>e("button",{key,onClick:()=>{setSelVerb(key);setSelTense("all");},style:{padding:"12px 8px",borderRadius:12,fontWeight:700,fontSize:13,textAlign:"center",background:selVerb===key?vd.color+"33":"#1a1a2e",color:selVerb===key?vd.color:"#9090b0",border:`2px solid ${selVerb===key?vd.color:"#2a2a4a"}`}},
          e("div",{style:{fontSize:18,marginBottom:2}},vd.emoji),
          e("div",{style:{fontSize:12,fontWeight:800}},vd.label),
          e("div",{style:{fontSize:10,color:selVerb===key?vd.color+"cc":"#5050a0"}},vd.fr)
        ))
      ),
      vd&&e("div",{style:{background:"#1a1a2e",borderRadius:14,padding:16,marginBottom:12,border:`1px solid ${vd.color}44`}},
        e("div",{style:{fontSize:13,fontWeight:700,color:vd.color,marginBottom:12}},`${vd.emoji} ${vd.label} — Choisir le temps`),
        e("div",{style:{display:"flex",flexWrap:"wrap",gap:8,marginBottom:14}},
          e("button",{onClick:()=>setSelTense("all"),style:{padding:"8px 14px",borderRadius:20,fontSize:12,fontWeight:700,background:selTense==="all"?vd.color+"33":"#0f0f1a",color:selTense==="all"?vd.color:"#7070a0",border:`1px solid ${selTense==="all"?vd.color:"#2a2a4a"}`}},"Tous les temps"),
          ...Object.entries(vd.tenses).map(([tName,tData])=>e("button",{key:tName,onClick:()=>setSelTense(tName),style:{padding:"8px 14px",borderRadius:20,fontSize:12,fontWeight:700,background:selTense===tName?vd.color+"33":"#0f0f1a",color:selTense===tName?vd.color:"#7070a0",border:`1px solid ${selTense===tName?vd.color:"#2a2a4a"}`}},
            tName," ",e("span",{style:{fontSize:10,color:LC[tData.level]}},"("+tData.level+")")
          ))
        ),
        // Aperçu conjugaison
        e("div",{style:{background:"#0f0f1a",borderRadius:10,padding:12,marginBottom:14}},
          e("div",{style:{fontSize:11,color:"#6060a0",marginBottom:8}},selTense==="all"?"Aperçu — Présent :":selTense+" :"),
          Object.entries(selTense==="all"?vd.tenses["Présent"].en:vd.tenses[selTense]?.en||{}).map(([subj,form])=>{
            const fr=(selTense==="all"?vd.tenses["Présent"].fr:vd.tenses[selTense]?.fr||{})[subj];
            return e("div",{key:subj,style:{display:"flex",justifyContent:"space-between",padding:"3px 0",borderBottom:"1px solid #1a1a2e"}},
              e("span",{style:{color:"#7070a0",fontSize:12}},subj),
              e("span",{style:{color:"#fff",fontWeight:700,fontSize:12}},form),
              e("span",{style:{color:"#5050a0",fontSize:11}},fr)
            );
          })
        ),
        e("div",{style:{fontSize:11,color:"#5050a0",marginBottom:12,textAlign:"center"}},
          selTense==="all"?`${vd.templates.length*5*Object.keys(vd.tenses).length} questions disponibles`:`${vd.templates.length*5} questions disponibles`
        ),
        e("button",{onClick:startVerbDrill,style:{width:"100%",padding:14,borderRadius:12,fontWeight:700,fontSize:16,background:`linear-gradient(135deg,${vd.color},${vd.color}99)`,color:"#0f0f1a",boxShadow:`0 4px 20px ${vd.color}44`}},`🚀 Travailler ${vd.label}`)
      )
    );
  }

  // ══════════════════════════════
  //  QUIZ SCREEN
  // ══════════════════════════════
  if((mode==="quiz"||mode==="errors"||mode==="verbquiz")&&currentQ){
    const ok=answered&&chosen===currentQ.answer;
    const isEM=mode==="errors";
    const isVB=mode==="verbquiz";
    const qNum=isEM?dailyIdx+1:isVB?verbIdx+1:poolIdx+1;
    const qTot=isEM?dailyErrors.length:isVB?verbPool.length:pool.length;
    const accent=isEM?"#ff6584":isVB?(VERB_DATA[selVerb]?.color||"#6c63ff"):(LC[currentQ.level]||"#6c63ff");

    return e("div",{style:{maxWidth:480,margin:"0 auto",padding:"16px",minHeight:"100vh"}},
      e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}},
        e("button",{onClick:()=>setMode(isVB?"verbselect":"home"),style:{background:"#1a1a2e",color:"#7070a0",padding:"8px 14px",borderRadius:10,fontSize:13,border:"1px solid #2a2a4a"}},isVB?"← Verbes":"← Accueil"),
        e("div",{style:{display:"flex",gap:12,fontSize:13,fontWeight:700}},
          e("span",{style:{color:"#00d9a3"}},`✓ ${score}`),
          e("span",{style:{color:"#ffd93d"}},streak>=3?`🔥${streak}`:`× ${total-score}`)
        )
      ),
      e("div",{style:{marginBottom:14}},
        e("div",{style:{display:"flex",justifyContent:"space-between",fontSize:11,color:"#5050a0",marginBottom:4}},
          e("span",null,isEM?"🔥 Erreurs récurrentes":isVB?`${VERB_DATA[selVerb]?.emoji} ${VERB_DATA[selVerb]?.label} — ${currentQ.tenseName}`:`${currentQ.cat} • ${currentQ.level}`),
          e("span",null,`${qNum}/${qTot}`)
        ),
        e("div",{style:{height:4,background:"#1a1a2e",borderRadius:2}},
          e("div",{style:{height:"100%",borderRadius:2,width:`${(qNum/qTot)*100}%`,background:accent,transition:"width 0.3s"}})
        )
      ),
      e("div",{style:{marginBottom:14,display:"flex",gap:8}},
        e("span",{style:{padding:"4px 10px",borderRadius:20,fontSize:11,fontWeight:700,background:(LC[currentQ.level]||"#6c63ff")+"22",color:LC[currentQ.level]||"#6c63ff",border:`1px solid ${LC[currentQ.level]||"#6c63ff"}44`}},currentQ.level),
        e("span",{style:{padding:"4px 10px",borderRadius:20,fontSize:11,fontWeight:700,background:(CC[currentQ.cat]||"#6c63ff")+"22",color:CC[currentQ.cat]||"#6c63ff",border:`1px solid ${CC[currentQ.cat]||"#6c63ff"}44`}},currentQ.cat)
      ),
      e("div",{style:{background:"#1a1a2e",borderRadius:16,padding:"22px 18px",marginBottom:18,border:"1px solid #2a2a4a",fontSize:20,fontWeight:600,lineHeight:1.5,color:"#fff"}},currentQ.sentence),
      e("div",{style:{display:"flex",flexDirection:"column",gap:10,marginBottom:16}},
        currentQ.opts.map(opt=>{
          let bg="#1a1a2e",border="#2a2a4a",color="#c0c0e0";
          if(answered){if(opt===currentQ.answer){bg="#00d9a322";border="#00d9a3";color="#00d9a3";}else if(opt===chosen){bg="#ff658422";border="#ff6584";color="#ff6584";}}
          return e("button",{key:opt,onClick:()=>handleAnswer(opt),style:{padding:"14px 18px",borderRadius:12,textAlign:"left",fontSize:16,fontWeight:600,background:bg,color,border:`2px solid ${border}`,transition:"all 0.15s"}},
            answered&&opt===currentQ.answer?"✓ ":answered&&opt===chosen&&opt!==currentQ.answer?"✗ ":"",opt
          );
        })
      ),
      answered&&e("div",{style:{background:ok?"#00d9a311":"#ff658411",border:`1px solid ${ok?"#00d9a344":"#ff658444"}`,borderRadius:12,padding:"14px 16px",marginBottom:14}},
        renderFeedback(currentQ,ok)
      ),
      answered&&e("button",{onClick:nextQ,style:{width:"100%",padding:14,borderRadius:12,fontWeight:700,fontSize:16,background:ok?"linear-gradient(135deg,#00d9a3,#00b894)":"linear-gradient(135deg,#6c63ff,#a855f7)",color:"#fff"}},
        isEM&&dailyIdx>=dailyErrors.length-1?"🏁 Terminer":"Question suivante →"
      )
    );
  }

  // ══════════════════════════════
  //  STATS
  // ══════════════════════════════
  if(mode==="stats"){
    const ti=estimateToeic(stats);
    return e("div",{style:{maxWidth:480,margin:"0 auto",padding:"16px",minHeight:"100vh"}},
      e("div",{style:{display:"flex",alignItems:"center",gap:12,marginBottom:20}},
        e("button",{onClick:()=>setMode("home"),style:{background:"#1a1a2e",color:"#7070a0",padding:"8px 14px",borderRadius:10,fontSize:13,border:"1px solid #2a2a4a"}},"← Retour"),
        e("span",{style:{fontWeight:700,fontSize:18,color:"#fff"}},"📊 Mes Statistiques")
      ),
      e("div",{style:{background:"#1a1a2e",borderRadius:14,padding:16,marginBottom:12,border:"1px solid #2a2a4a"}},
        e("div",{style:{fontSize:12,color:"#7070a0",marginBottom:6}},"Score TOEIC estimé"),
        e("div",{style:{fontSize:42,fontWeight:800,color:LC[ti.level]}},ti.score),
        e("div",{style:{fontSize:13,color:"#9090b0"}},"Niveau ",e("span",{style:{color:LC[ti.level],fontWeight:700}},ti.level)," • ",stats.total," questions • ",ti.pct,"% de réussite")
      ),
      e("div",{style:{background:"#1a1a2e",borderRadius:14,padding:16,marginBottom:12,border:"1px solid #2a2a4a"}},
        e("div",{style:{fontSize:13,fontWeight:700,color:"#9090b0",marginBottom:12}},"PAR NIVEAU"),
        ["A1","A2","B1","B2","C1","C2"].map(lvl=>{
          const d=stats.byLevel?.[lvl]||{total:0,correct:0};
          const pct=d.total>0?Math.round(d.correct/d.total*100):0;
          return e("div",{key:lvl,style:{marginBottom:10}},
            e("div",{style:{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:4}},
              e("span",{style:{color:LC[lvl],fontWeight:700}},lvl),
              e("span",{style:{color:"#7070a0"}},d.total>0?`${d.correct}/${d.total} (${pct}%)`:"—")
            ),
            d.total>0&&e("div",{style:{height:6,background:"#0f0f1a",borderRadius:3}},
              e("div",{style:{height:"100%",width:pct+"%",background:LC[lvl],borderRadius:3}})
            )
          );
        })
      ),
      e("div",{style:{background:"#1a1a2e",borderRadius:14,padding:16,marginBottom:12,border:"1px solid #2a2a4a"}},
        e("div",{style:{fontSize:13,fontWeight:700,color:"#9090b0",marginBottom:12}},"PAR CATÉGORIE"),
        Object.entries(stats.byCat||{}).map(([ct,d])=>{
          const pct=d.total>0?Math.round(d.correct/d.total*100):0;
          return e("div",{key:ct,style:{marginBottom:10}},
            e("div",{style:{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:4}},
              e("span",{style:{color:CC[ct]||"#6c63ff",fontWeight:700}},ct),
              e("span",{style:{color:"#7070a0"}},`${d.correct}/${d.total} (${pct}%)`)
            ),
            e("div",{style:{height:6,background:"#0f0f1a",borderRadius:3}},
              e("div",{style:{height:"100%",width:pct+"%",background:CC[ct]||"#6c63ff",borderRadius:3}})
            )
          );
        })
      ),
      e("button",{onClick:()=>{if(confirm("Remettre à zéro ?")){{const emp={total:0,correct:0,byLevel:{},byCat:{}};setStats(emp);saveLS("ep_st5",emp);}}},style:{width:"100%",padding:12,borderRadius:12,color:"#5050a0",background:"transparent",border:"1px solid #2a2a4a",fontSize:13}},"🗑 Réinitialiser les statistiques")
    );
  }
  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(e(App));
</script>
</body>
</html>
